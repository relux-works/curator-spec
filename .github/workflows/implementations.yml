name: Implementation conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: implementations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Implementations (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CURATOR_CONFORMANCE_ROOT: ${{ github.workspace }}/conformance/v1
    steps:
      - name: Checkout specification
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout Go manager
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: relux-works/curator
          ref: 17804ceae42d3bb62abf6e8a9d9cbef6dd5370b8
          path: implementations/go
          submodules: true

      - name: Checkout Python manager
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ivanopcode/cocoaskills
          ref: 6fc2fd97dbdf40f5b0e46f846eaa0d78a1b33d12
          path: implementations/manager

      - name: Checkout registry service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: relux-works/curator-skill-registry
          ref: d690bea6fab1c8e6392e05d3a3cdfcf1168bc914
          path: implementations/registry

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: implementations/go/go.mod
          cache: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Python implementations
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./implementations/manager[dev]" -e "./implementations/registry[dev]"

      - name: Go manager shared suite
        working-directory: implementations/go
        run: go test -count=1 -v ./internal/interop ./internal/closure ./internal/skillspec

      - name: Python manager shared suite
        run: >-
          python tools/run_pytest_no_skips.py -q
          implementations/manager/tests/test_protocol_conformance.py

      - name: Python manager lifecycle behavior
        run: >-
          python -m pytest -q
          implementations/manager/tests/test_cli.py::test_cli_bootstrap_if_missing_keeps_existing_config
          implementations/manager/tests/test_cli.py::test_cli_bootstrap_if_missing_creates_absent_config
          implementations/manager/tests/test_cli.py::test_cli_bootstrap_if_missing_and_force_are_mutually_exclusive
          implementations/manager/tests/test_cli.py::test_cli_upgrade_dry_run_does_not_create_or_fetch_skills_root
          implementations/manager/tests/test_cli.py::test_cli_upgrade_fetches_only_selected_project_skill_repositories
          implementations/manager/tests/test_closure_install.py::test_upgrade_fetches_transitive_dependency_closure
          implementations/manager/tests/test_global_install.py::test_global_upgrade_dry_run_does_not_create_or_fetch_skills_root
          implementations/manager/tests/test_install.py::test_runtime_shim_resolves_project_skill_command_dependency_without_shell_hook
          implementations/manager/tests/test_install.py::test_runtime_shim_captures_declared_system_dependency_path
          implementations/manager/tests/test_shims.py::test_unix_wrapper_prepends_runtime_path_entries
          implementations/manager/tests/test_shims.py::test_windows_wrapper_prepends_runtime_path_entries

      - name: Registry service shared suite
        run: >-
          python tools/run_pytest_no_skips.py -q
          implementations/registry/tests/test_protocol_conformance.py
