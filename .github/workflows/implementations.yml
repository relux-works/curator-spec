name: Implementation conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: implementations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: Implementations (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CURATOR_CONFORMANCE_ROOT: ${{ github.workspace }}/conformance/v1
    steps:
      - name: Checkout specification
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout Go manager
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: relux-works/curator
          ref: ecb6c1af0f4bc4056bead4095933e0b83db7d2b1
          path: implementations/go
          submodules: true

      - name: Checkout Python manager
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ivanopcode/cocoaskills
          ref: 788676c1ede6e0da46d8d2604ee16814e917071d
          path: implementations/manager

      - name: Checkout registry service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ivanopcode/cocoaskills-registry
          ref: 0151057bdbb1bea5ccaa6c018bf20a5cb1444514
          path: implementations/registry

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: implementations/go/go.mod
          cache: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Python implementations
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./implementations/manager[dev]" -e "./implementations/registry[dev]"

      - name: Go manager shared suite
        working-directory: implementations/go
        run: go test -count=1 -v ./internal/interop ./internal/closure ./internal/skillspec

      - name: Python manager shared suite
        run: >-
          python tools/run_pytest_no_skips.py -q
          implementations/manager/tests/test_protocol_conformance.py

      - name: Registry service shared suite
        run: >-
          python tools/run_pytest_no_skips.py -q
          implementations/registry/tests/test_protocol_conformance.py
