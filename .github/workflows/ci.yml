name: Specification CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: specification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Specification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate schemas, cases, manifest, and local links
        run: python tools/validate.py

      - name: Verify generator and cryptographic vectors
        run: go test ./tools/...

      - name: Regenerate authoritative vectors
        run: go run ./tools/generate-vectors -root .

      - name: Prove deterministic regeneration
        run: git diff --exit-code -- conformance/v1

  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check Go formatting
        run: |
          files="$(gofmt -l tools)"
          test -z "$files" || { echo "$files"; exit 1; }
      - name: Check whitespace
        run: git diff --check

  links:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --accept 200,206,429
            '**/*.md'
          fail: true
