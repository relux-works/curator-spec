name: Specification CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: specification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Specification (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate schemas, cases, manifest, and local links
        run: python tools/validate.py

      - name: Verify generator and cryptographic vectors
        run: go test ./tools/...

      - name: Regenerate authoritative vectors
        run: go run ./tools/generate-vectors -root .

      - name: Prove deterministic regeneration
        run: git diff --exit-code -- conformance/v1

  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Go formatting
        run: |
          files="$(gofmt -l tools)"
          test -z "$files" || { echo "$files"; exit 1; }
      - name: Check whitespace
        run: git diff --check

  links:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --accept 200,206,429
            --exclude-mail
            '**/*.md'
          fail: true
