name: Release specification

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Publish signed specification artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate release input
        run: |
          python tools/validate.py
          go test ./tools/...
          go run ./tools/generate-vectors -root .
          git diff --exit-code -- conformance/v1
          version="${GITHUB_REF_NAME#v}"
          grep -Fx "**Version:** ${version}" README.md

      - name: Package normative release
        run: |
          version="${GITHUB_REF_NAME#v}"
          directory="curator-protocol-${version}"
          mkdir "$directory"
          cp -R README.md LICENSE CHANGELOG.md COMPATIBILITY.md SECURITY.md GOVERNANCE.md \
            protocol profiles cli conformance schemas decisions "$directory/"
          tar -czf "${directory}.tar.gz" "$directory"
          zip -qr "${directory}.zip" "$directory"
          sha256sum "${directory}.tar.gz" "${directory}.zip" > checksums.txt

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            curator-protocol-*.tar.gz
            curator-protocol-*.zip
            checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            curator-protocol-*.tar.gz
            curator-protocol-*.zip
            checksums.txt
