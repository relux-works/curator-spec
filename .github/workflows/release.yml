name: Release specification

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Publish signed specification artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate release input
        run: |
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "$PWD/maintainers.allowed_signers"
          git verify-tag "$GITHUB_REF_NAME"
          git verify-commit "$GITHUB_SHA"
          python tools/validate.py
          go test ./tools/...
          go run ./tools/generate-vectors -root .
          git diff --exit-code -- conformance/v1
          version="${GITHUB_REF_NAME#v}"
          grep -Fx "**Version:** ${version}" README.md

      - name: Package normative release
        run: |
          version="${GITHUB_REF_NAME#v}"
          directory="curator-protocol-${version}"
          mkdir "$directory"
          cp -R README.md LICENSE CHANGELOG.md COMPATIBILITY.md SECURITY.md GOVERNANCE.md maintainers.allowed_signers \
            protocol profiles cli conformance schemas decisions "$directory/"
          tar -czf "${directory}.tar.gz" "$directory"
          zip -qr "${directory}.zip" "$directory"
          sha256sum "${directory}.tar.gz" "${directory}.zip" > checksums.txt

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            curator-protocol-*.tar.gz
            curator-protocol-*.zip
            checksums.txt

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            curator-protocol-*.tar.gz
            curator-protocol-*.zip
            checksums.txt
